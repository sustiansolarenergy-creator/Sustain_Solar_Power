	<style>
		.thumb-btn {
			opacity: 0.5;
			height: 70px;
			object-fit: cover;
			width: 100%;
			cursor: pointer;
			transition: 0.3s;
			border: 2px solid transparent;
		}

			.thumb-btn.active {
				opacity: 1;
				border-color: #32c36c;
				transform: scale(1.05);
			}

		.project-main-slider img {
			height: 450px;
			object-fit: cover;
			width: 100%;
		}
	</style>

	<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. Unga image list-ah inga mattum update pannunga machi
    const projectImages = [
        "img/gal/g-img1.jpg",
        "img/gal/g-img2.jpg",
        "img/gal/g-img3.jpg",
       "img/gal/g-img4.jpg",
        "img/gal/g-img5.jpg",
        "img/gal/g-img6.jpg",
		"img/gal/g-img7.jpg",
		"img/gal/g-img8.jpg",// Neenga evlo venumnaalum add pannikalam
    ];

    const mainSlider = document.getElementById('main-slider');
    const thumbContainer = document.getElementById('thumb-container');

    // 2. Loop panni HTML generate panrom
    projectImages.forEach((imgSrc, index) => {
        // Add to Main Slider
        mainSlider.innerHTML += `<div class="item"><img src="${imgSrc}" class="img-fluid"></div>`;

        // Add to Thumbnails (Bootstrap col-2 or col-3 based on count)
        thumbContainer.innerHTML += `
            <div class="col-2">
                <img src="${imgSrc}" class="img-fluid rounded thumb-btn ${index === 0 ? 'active' : ''}" data-slide="${index}">
            </div>`;
    });

    // 3. Initialize Owl after injecting HTML
    var $owl = $('.project-main-slider').owlCarousel({
        items: 1,
        loop: true,
        dots: false,
        autoplay: true,
        smartSpeed: 800
    });

    // 4. Click Function
    $(document).on('click', '.thumb-btn', function() {
        var slideIndex = $(this).data('slide');
        $owl.trigger('to.owl.carousel', [slideIndex, 500]);
        $('.thumb-btn').removeClass('active');
        $(this).addClass('active');
    });
});
	</script>
